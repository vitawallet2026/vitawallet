<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Operator Panel · Vita Secure</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0c0f; height: 100vh; overflow: hidden; position: relative; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.15; }
        .login-container { position: relative; z-index: 2; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: rgba(12,15,20,0.9); backdrop-filter: blur(12px); border-radius: 24px; padding: 40px; width: 100%; max-width: 420px; border: 1px solid rgba(0,255,255,0.2); box-shadow: 0 0 40px rgba(0,255,255,0.1), 0 25px 40px rgba(0,0,0,0.5); }
        .logo-area { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 48px; color: #00ffff; text-shadow: 0 0 10px #00ffff; margin-bottom: 12px; }
        .logo-area h1 { color: #fff; font-size: 22px; font-weight: 600; }
        .logo-area p { color: #00ffff; font-size: 12px; font-family: monospace; margin-top: 8px; }
        .input-group { margin-bottom: 24px; }
        .input-group label { display: block; color: #8a8f9e; font-size: 12px; font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .input-wrapper { display: flex; align-items: center; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,255,255,0.2); border-radius: 12px; transition: 0.3s; }
        .input-wrapper:focus-within { border-color: #00ffff; box-shadow: 0 0 15px rgba(0,255,255,0.2); }
        .input-wrapper i { color: #00ffff; padding: 0 16px; font-size: 18px; }
        .input-wrapper input { width: 100%; padding: 14px 16px 14px 0; background: transparent; border: none; color: #fff; font-size: 15px; outline: none; font-family: 'Inter', monospace; }
        .input-wrapper input::placeholder { color: #3a3f4e; }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #00aaff, #00ffff); border: none; border-radius: 12px; color: #0a0c0f; font-weight: 700; font-size: 16px; cursor: pointer; margin-bottom: 20px; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,255,255,0.3); }
        .error-msg { background: rgba(255,68,68,0.15); border: 1px solid rgba(255,68,68,0.3); border-radius: 10px; padding: 12px; margin-bottom: 20px; color: #ff6666; font-size: 13px; text-align: center; display: none; }
        .status { text-align: center; margin-top: 20px; font-size: 13px; color: #4a4f5e; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .status-dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 5px #00ff88; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    </style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>
<div class="login-container">
    <div class="login-card">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-shield-haltered"></i></div>
            <h1>OPERATOR PANEL</h1>
            <p>VITA SECURE · v3.0</p>
        </div>
        <div id="errorMsg" class="error-msg">⚠️ Credenciais inválidas. Acesso negado.</div>
        <form id="loginForm">
            <div class="input-group"><label>IDENTIFICAÇÃO</label><div class="input-wrapper"><i class="fas fa-user"></i><input type="text" id="username" placeholder="operador" autocomplete="off"></div></div>
            <div class="input-group"><label>CHAVE DE ACESSO</label><div class="input-wrapper"><i class="fas fa-key"></i><input type="password" id="password" placeholder="••••••••"></div></div>
            <button type="submit" class="login-btn"><i class="fas fa-terminal"></i> ACESSAR PAINEL</button>
            <div class="status"><div class="status-dot"></div><span>SISTEMA OPERACIONAL · ENCRIPTADO</span></div>
        </form>
    </div>
</div>
<script>
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()<>[]{}";
    const fontSize = 14, columns = canvas.width / fontSize, drops = [];
    for (let i = 0; i < columns; i++) drops[i] = Math.random() * -100;
    function drawMatrix() {
        ctx.fillStyle = 'rgba(10,12,15,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#00ff88'; ctx.font = fontSize + 'px monospace';
        for (let i = 0; i < drops.length; i++) {
            ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*fontSize, drops[i]*fontSize);
            if (drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        if (document.getElementById('username').value.trim() === 'operador' && document.getElementById('password').value === 'vita2024') {
            window.location.href = 'painel-dashboard.html';
        } else {
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('password').value = '';
            setTimeout(() => { document.getElementById('errorMsg').style.display = 'none'; }, 3000);
        }
    });
</script>
</body>
</html>
